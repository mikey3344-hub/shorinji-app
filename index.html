select, button, input { padding:10px; margin:6px; border-radius:8px; }
button { background:#007bff; color:white; border:none; }
.secondary { background:#198754; }
.danger { background:#dc3545; }
.card { background:white; padding:20px; border-radius:12px; margin-top:20px; }
.grade { padding:8px; border-radius:6px; color:white; font-weight:bold; }
.watermark {
position: fixed;
top: 50%; left: 50%;
width: 320px; height: 320px;
transform: translate(-50%, -50%);
opacity: 0.06;
background-image: url('skp_icon.png');
background-size: contain;
background-repeat: no-repeat;
background-position: center;
pointer-events:none;
z-index:0;
}
.content { position:relative; z-index:2; }
.loginBox { background:white; padding:25px; border-radius:12px; max-width:380px; margin:40px auto; }
</style>

<div class="watermark"></div>

<div class="container content">
<div id="loginScreen" class="loginBox">

<br>
<button onclick="drawCard()">🎴 Tirer</button>
<button class="secondary" onclick="toggleNoRepeat()" id="norepeatBtn">Sans répétition OFF</button>
<button class="danger" onclick="resetAll()">Reset</button>

<button onclick="openVideo()">📺 Ouvrir la vidéo</button>
</div>

    "grade": "2EME KYU",
    "technique": "JOAKU DORI",
    "link": "https://youtu.be/0cIhjH2jENQ"
  }
];
let currentCard = null;
let history = [];
let noRepeatMode = false;
let remainingPool = [];
let stats = {
"6EME KYU":0,"5EME KYU":0,"4EME KYU":0,
"3EME KYU":0,"2EME KYU":0,"1ER KYU":0,"1ER DAN":0
};
function checkPassword(){
if(passwordInput.value===PASSWORD){
localStorage.setItem("skp_auth","ok");
loginScreen.style.display="none";
appScreen.style.display="block";
}else{ loginError.innerText="Mot de passe incorrect"; }
}
function autoLogin(){
if(localStorage.getItem("skp_auth")==="ok"){
loginScreen.style.display="none";
appScreen.style.display="block";
}
}
function gradeColor(g){
if(g==="1ER DAN") return "#000";
if(["1ER KYU","2EME KYU","3EME KYU"].includes(g)) return "#8B4513";
return "#2ecc71";
}
function getFiltered(){
let g=gradeSelect.value;
return g==="ALL"?cards:cards.filter(c=>c.grade===g);
}
function initPool(){ remainingPool=[...getFiltered()]; }
function toggleNoRepeat(){
noRepeatMode=!noRepeatMode;
norepeatBtn.innerText=noRepeatMode?"Sans répétition ON":"Sans répétition OFF";
initPool();
}
gradeSelect.addEventListener("change",()=>{ if(noRepeatMode) initPool(); });
function drawCard(){
let pool=noRepeatMode?remainingPool:getFiltered();
if(pool.length===0){ alert("Plus de techniques."); initPool(); return; }
let i=Math.floor(Math.random()*pool.length);
currentCard=pool[i];
if(noRepeatMode) remainingPool.splice(i,1);
displayCard(currentCard);
}
function searchTechnique(){
let q=searchInput.value.toLowerCase().trim();
if(!q) return alert("Tape un nom.");
let res=cards.filter(c=>c.technique.toLowerCase().includes(q));
if(res.length===0) return alert("Aucune trouvée.");
displayCard(res[0]);
}
function displayCard(c){
cardDisplay.style.display="block";
gradeDisplay.innerText=c.grade;
gradeDisplay.style.background=gradeColor(c.grade);
techniqueDisplay.innerText=c.technique;
stats[c.grade]++;
updateStats();
history.unshift(c.grade+" - "+c.technique);
if(history.length>10) history.pop();
updateHistory();
}
function updateStats(){
statsList.innerHTML="";
for(let g in stats){
let li=document.createElement("li");
li.innerText=g+" : "+stats[g];
statsList.appendChild(li);
}
}
function updateHistory(){
historyList.innerHTML="";
history.forEach(h=>{
let li=document.createElement("li");
li.innerText=h;
historyList.appendChild(li);
});
}
function resetAll(){
history=[];
for(let g in stats) stats[g]=0;
initPool();
updateStats();
updateHistory();
cardDisplay.style.display="none";
}
function openVideo(){
if(currentCard?.link) window.open(currentCard.link,"_blank");
}
updateStats();
initPool();
autoLogin();
passwordInput.addEventListener("keydown",e=>{ if(e.key==="Enter") checkPassword(); });
</script>
</body>
</html>
